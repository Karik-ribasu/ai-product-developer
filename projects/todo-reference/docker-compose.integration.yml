# Integration tests only — isolated Node runner + dedicated Postgres (test-scoped DB; never use a developer workstation DATABASE_URL).
name: todo-reference-integration

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todos
      POSTGRES_DB: todo_reference_integration
    volumes:
      - integration-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U todo -d todo_reference_integration || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  integration-tests:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CI: "true"
      NODE_ENV: test
      SQLITE_PATH: /tmp/todo-reference-integration.sqlite
      DATABASE_URL: postgresql://todo:todos@postgres:5432/todo_reference_integration?schema=public
    volumes:
      - .:/workspace
      - integration-node-modules:/workspace/node_modules
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        corepack enable
        npm install -g bun@1.3.1
        cd /workspace
        bun install --frozen-lockfile
        bunx prisma migrate deploy
        bunx prisma generate
        bun run db:seed
        ./node_modules/.bin/vitest run --config vitest.integration.config.ts --coverage

volumes:
  integration-node-modules:
  integration-postgres-data:
