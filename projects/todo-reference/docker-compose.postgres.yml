# Local development — PostgreSQL only. Use a unique POSTGRES_DB per developer/worktree (see README).
name: todo-reference-postgres-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todos
      POSTGRES_DB: ${POSTGRES_DB:-todo_reference_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  dev-postgres-data:
