# E2E — Next.js app + Postgres + Chromium; stable in-compose base URL http://web:3000; DB hostname `postgres`.
name: todo-reference-e2e

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todos
      POSTGRES_DB: todo_reference_e2e
    volumes:
      - e2e-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U todo -d todo_reference_e2e || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      SQLITE_PATH: /data/todos.sqlite
      DATABASE_URL: postgresql://todo:todos@postgres:5432/todo_reference_e2e?schema=public
      STITCH_BASELINE_UI: ${STITCH_BASELINE_UI:-}
    volumes:
      - e2e-sqlite:/data
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        ./node_modules/.bin/prisma migrate deploy
        ./node_modules/.bin/prisma db seed
        exec node node_modules/next/dist/bin/next start -H 0.0.0.0 -p 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 90s

  e2e:
    image: mcr.microsoft.com/playwright:v1.51.1-jammy
    depends_on:
      web:
        condition: service_healthy
    working_dir: /workspace
    environment:
      CI: "true"
      E2E_BASE_URL: http://web:3000
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      DATABASE_URL: postgresql://todo:todos@postgres:5432/todo_reference_e2e?schema=public
    volumes:
      - .:/workspace
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        npm install -g bun@1.3.1
        cd /workspace
        bun install --frozen-lockfile
        bunx playwright test -c e2e/playwright.config.ts

volumes:
  e2e-sqlite:
  e2e-postgres-data:
